<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Session - Solicode AMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50" x-data="{ sidebarOpen: false }">

    <div class="flex h-screen overflow-hidden">
        <!-- Desktop Sidebar (Same as dashboard) -->
        <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-gray-200">
            <div class="flex items-center h-16 px-6 border-b border-gray-200">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="school" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Solicode AMS</h1>
                        <p class="text-xs text-gray-500">Administrator</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <a href="admin-dashboard.html" class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-medium">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Add Session</span>
                </a>
                <a href="admin-students.html" class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span>Students</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6">
                <div class="flex items-center space-x-4">
                    <a href="admin-dashboard.html" class="text-gray-500 hover:text-blue-600 transition-colors">
                        <i data-lucide="arrow-left" class="w-6 h-6"></i>
                    </a>
                    <h2 class="text-xl font-bold text-gray-800">Add Academic Session</h2>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-8">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
                        <div class="p-6 border-b border-gray-200 bg-gray-50/50">
                            <h3 class="text-lg font-semibold text-gray-800">Session Configuration</h3>
                            <p class="text-sm text-gray-500">Define the module, teacher, and schedule for this session.</p>
                        </div>
                        
                        <form class="p-8 space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Module Selection -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Module</label>
                                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none bg-white">
                                        <option value="">Select a Module</option>
                                        <template x-for="mod in AppData.modules">
                                            <option :value="mod.id" x-text="mod.name"></option>
                                        </template>
                                    </select>
                                </div>

                                <!-- Teacher Selection -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Teacher</label>
                                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none bg-white">
                                        <option value="">Select a Teacher</option>
                                        <template x-for="tp in AppData.teacherProfiles">
                                            <option :value="tp.id" x-text="DataHelpers.getTeacherUser(tp.id).name"></option>
                                        </template>
                                    </select>
                                </div>

                                <!-- Group Selection -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Group</label>
                                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none bg-white">
                                        <option value="">Select a Group</option>
                                        <template x-for="grp in AppData.groups">
                                            <option :value="grp.id" x-text="grp.name"></option>
                                        </template>
                                    </select>
                                </div>

                                <!-- Session Type -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Session Type</label>
                                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none bg-white">
                                        <option value="lecture">Lecture</option>
                                        <option value="td">TD (Travaux Dirigés)</option>
                                        <option value="tp">TP (Travaux Pratiques)</option>
                                    </select>
                                </div>
                            </div>

                            <hr class="border-gray-100">

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <!-- Start Time -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Start Time</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                                        </div>
                                        <input type="time" name="start_time" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none">
                                    </div>
                                </div>

                                <!-- End Time -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">End Time</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                                        </div>
                                        <input type="time" name="end_time" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all outline-none">
                                    </div>
                                </div>

                                <!-- Duration (Read Only/Calculated) -->
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Duration (Hours)</label>
                                    <input type="number" step="0.5" disabled placeholder="Computed..." class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-500 outline-none">
                                </div>
                            </div>

                            <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200">
                                <a href="admin-dashboard.html" class="px-6 py-3 rounded-xl text-gray-700 font-medium hover:bg-gray-100 transition-colors">
                                    Cancel
                                </a>
                                <button type="button" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 hover:shadow-lg active:scale-95 transition-all flex items-center">
                                    <i data-lucide="save" class="w-5 h-5 mr-2"></i>
                                    Create Session
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
