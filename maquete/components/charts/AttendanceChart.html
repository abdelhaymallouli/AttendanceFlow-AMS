<!--
  CHART: AttendanceChart
  Weekly attendance bar chart using Chart.js.
  Requires: <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  Usage: Drop inside a ChartSection or any container with defined height.
-->
<div class="bg-white border border-gray-200 rounded-xl p-6">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-lg font-bold text-gray-800">Weekly Attendance Trend</h3>
            <p class="text-sm text-gray-500">Present vs Absent vs Late — this week</p>
        </div>
        <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-lg">
            <button class="px-3 py-1.5 text-xs font-semibold bg-white text-gray-800 rounded-md shadow-sm">Week</button>
            <button class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 rounded-md">Month</button>
        </div>
    </div>

    <!-- Chart canvas -->
    <div class="relative h-64">
        <canvas id="attendanceChart"></canvas>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-5 mt-4 pt-4 border-t border-gray-100">
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-sm bg-blue-500"></span> Present
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-sm bg-red-400"></span> Absent
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-sm bg-amber-400"></span> Late
        </div>
    </div>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    (function () {
        const ctx = document.getElementById('attendanceChart');
        if (!ctx) return;
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'],
                datasets: [
                    {
                        label: 'Present',
                        data: [817, 802, 830, 815, 795],
                        backgroundColor: 'rgba(59, 130, 246, 0.85)',
                        borderRadius: 6,
                        barPercentage: 0.65
                    },
                    {
                        label: 'Absent',
                        data: [20, 30, 12, 22, 35],
                        backgroundColor: 'rgba(239, 68, 68, 0.75)',
                        borderRadius: 6,
                        barPercentage: 0.65
                    },
                    {
                        label: 'Late',
                        data: [10, 15, 5, 10, 17],
                        backgroundColor: 'rgba(245, 158, 11, 0.75)',
                        borderRadius: 6,
                        barPercentage: 0.65
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1f2937',
                        titleColor: '#f9fafb',
                        bodyColor: '#d1d5db',
                        padding: 10,
                        cornerRadius: 8
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#6b7280', font: { size: 12 } }
                    },
                    y: {
                        grid: { color: '#f3f4f6' },
                        ticks: { color: '#6b7280', font: { size: 12 } },
                        beginAtZero: true
                    }
                }
            }
        });
    })();
</script>
