<!--
  ORGANISM: Sidebar
  Full navigation sidebar for Admin, Teacher, and Student roles.
  Includes: desktop sidebar + mobile slide-over + logo + nav links + user snippet
  Usage: Drop inside x-data="{ sidebarOpen: false }" body wrapper
-->

<!-- ===== MOBILE SIDEBAR OVERLAY ===== -->
<div x-show="sidebarOpen" x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-x-full" x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-x-0"
    x-transition:leave-end="opacity-0 -translate-x-full" class="fixed inset-0 z-50 lg:hidden" style="display: none;">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50" @click="sidebarOpen = false"></div>
    <!-- Panel -->
    <div class="absolute left-0 top-0 h-full w-64 bg-white border-r border-gray-200 flex flex-col">
        <!-- Logo -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="school" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold text-gray-800">Solicode AMS</h1>
                    <p class="text-xs text-gray-500">Administrator</p>
                </div>
            </div>
            <button @click="sidebarOpen = false" class="text-gray-400 hover:text-gray-600 p-1">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <!-- Nav links -->
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="admin-dashboard.html"
                class="flex items-center space-x-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
            </a>
            <a href="attendance-entry.html"
                class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="clipboard-check" class="w-5 h-5"></i><span>Attendance Entry</span>
                <span class="ml-auto bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">HOT</span>
            </a>
            <a href="admin-reports.html"
                class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i><span>Reports</span>
            </a>
            <a href="admin-students.html"
                class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i><span>Students</span>
            </a>
            <a href="admin-calendar.html"
                class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="calendar" class="w-5 h-5"></i><span>Calendar</span>
            </a>
            <a href="admin-justifications.html"
                class="flex items-center space-x-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i><span>Justifications</span>
                <span class="ml-auto bg-amber-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">7</span>
            </a>
        </nav>
        <!-- User profile -->
        <div class="border-t border-gray-200 p-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-800 truncate">Admin User</p>
                    <p class="text-xs text-gray-500 truncate">admin@school.edu</p>
                </div>
                <a href="login.html" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </div>
</div>
