<!--
  ORGANISM: ActionPanel
  Quick action buttons + class summary panel.
  Shown on the left column of the admin dashboard.
-->
<div class="bg-white border border-gray-200 rounded-xl p-6">
    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <i data-lucide="zap" class="w-5 h-5 text-blue-600"></i>
        Quick Actions
    </h3>

    <div class="space-y-3">
        <!-- Primary CTA -->
        <a href="attendance-entry.html" class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700
             text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm">
            <i data-lucide="plus-circle" class="w-5 h-5"></i>
            Attendance Entry
        </a>

        <!-- Export Report -->
        <a href="admin-reports.html" class="flex items-center justify-center gap-2 w-full bg-white hover:bg-gray-50
             border border-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg transition-colors">
            <i data-lucide="download" class="w-5 h-5"></i>
            Export Report
        </a>

        <!-- Send Notifications -->
        <button type="button" class="flex items-center justify-center gap-2 w-full bg-white hover:bg-gray-50
             border border-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg transition-colors">
            <i data-lucide="send" class="w-5 h-5"></i>
            Send Notifications
        </button>
    </div>

    <!-- Class summary divider -->
    <div class="mt-6 pt-6 border-t border-gray-200">
        <h4 class="text-sm font-semibold text-gray-700 mb-3">Classes Overview</h4>
        <div class="space-y-2 text-sm">
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Grade 10A</span>
                <span class="font-medium text-green-600">98% present</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Grade 10B</span>
                <span class="font-medium text-green-600">95% present</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Grade 11A</span>
                <span class="font-medium text-amber-600">92% present</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-600">Grade 11B</span>
                <span class="font-medium text-green-600">97% present</span>
            </div>
        </div>
    </div>
</div>
