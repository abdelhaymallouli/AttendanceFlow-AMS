<!--
  ORGANISM: ChartSection
  Container wrapper for data visualization charts.
  Drop any chart (AttendanceChart, JustificationChart, etc.) inside.
-->
<div class="bg-white border border-gray-200 rounded-xl p-6">
    <!-- Section Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-lg font-bold text-gray-800">Attendance Overview</h3>
            <p class="text-sm text-gray-500 mt-0.5">Weekly attendance statistics</p>
        </div>
        <!-- Period filter tabs -->
        <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-lg">
            <button class="px-3 py-1.5 text-xs font-semibold bg-white text-gray-800 rounded-md shadow-sm">Week</button>
            <button class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 rounded-md">Month</button>
            <button class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 rounded-md">Year</button>
        </div>
    </div>

    <!-- Chart canvas placeholder — replace with AttendanceChart.html content -->
    <div class="relative h-64">
        <canvas id="chartCanvas"></canvas>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-4 mt-4 pt-4 border-t border-gray-100">
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-full bg-blue-500"></span> Present
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-full bg-red-400"></span> Absent
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-600">
            <span class="w-3 h-3 rounded-full bg-amber-400"></span> Late
        </div>
    </div>
</div>
