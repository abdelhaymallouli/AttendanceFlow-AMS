<!--
  ORGANISM: TopBar
  The main header bar — page title, date, notifications bell.
  Usage: Drop as the first child inside the main content column.
-->
<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-30">
    <!-- Left: menu toggle (mobile) + page title -->
    <div class="flex items-center space-x-4">
        <!-- Mobile menu button -->
        <button @click="sidebarOpen = true" class="lg:hidden text-gray-500 hover:text-gray-700 p-1">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <!-- Page title area -->
        <div>
            <h2 class="text-xl font-bold text-gray-800">Dashboard</h2>
            <p class="text-sm text-gray-500 hidden sm:block">Welcome back, Administrator</p>
        </div>
    </div>

    <!-- Right: date + notifications + optional search -->
    <div class="flex items-center space-x-3">
        <!-- Current date (hidden on small screens) -->
        <div class="hidden md:flex items-center space-x-2 text-sm text-gray-500">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <span id="topBarDate"></span>
        </div>

        <!-- Notification bell -->
        <button class="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <!-- Unread dot -->
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- (Optional) User avatar quick-access -->
        <button
            class="w-9 h-9 bg-blue-100 rounded-full flex items-center justify-center hover:bg-blue-200 transition-colors">
            <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
        </button>
    </div>
</header>

<script>
    // Inject current date into TopBar
    const el = document.getElementById('topBarDate');
    if (el) {
        el.textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
    }
</script>
