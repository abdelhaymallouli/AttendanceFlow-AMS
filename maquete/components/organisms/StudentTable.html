<!--
  ORGANISM: StudentTable
  Attendance list table with filter bar, status buttons, and pagination.
  Requires Alpine.js for status toggle. Tailwind for layout.
-->
<div x-data="{
  searchQuery: '',
  selectedClass: 'all',
  students: [
    { id:'STU001', name:'Emma Johnson',    email:'emma.j@school.edu',   class:'10A', status: null },
    { id:'STU002', name:'Liam Smith',      email:'liam.s@school.edu',   class:'10A', status: null },
    { id:'STU003', name:'Olivia Brown',    email:'olivia.b@school.edu', class:'10B', status: null },
    { id:'STU004', name:'Noah Davis',      email:'noah.d@school.edu',   class:'10B', status: null },
    { id:'STU005', name:'Ava Wilson',      email:'ava.w@school.edu',    class:'11A', status: null },
    { id:'STU006', name:'Elijah Moore',    email:'elijah.m@school.edu', class:'11A', status: null },
    { id:'STU007', name:'Sophia Taylor',   email:'sophia.t@school.edu', class:'11B', status: null },
    { id:'STU008', name:'James Anderson',  email:'james.a@school.edu',  class:'11B', status: null }
  ],
  get filtered() {
    return this.students.filter(s => {
      const matchClass = this.selectedClass === 'all' || s.class === this.selectedClass;
      const matchSearch = s.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || s.id.toLowerCase().includes(this.searchQuery.toLowerCase());
      return matchClass && matchSearch;
    });
  },
  toggle(id, status) {
    const s = this.students.find(s => s.id === id);
    if (s) s.status = s.status === status ? null : status;
  },
  presentCount()  { return this.students.filter(s => s.status==='present').length; },
  absentCount()   { return this.students.filter(s => s.status==='absent').length; },
  lateCount()     { return this.students.filter(s => s.status==='late').length; },
  unmarkedCount() { return this.students.filter(s => s.status===null).length; }
}">

    <!-- Filter Bar -->
    <div class="bg-white border border-gray-200 rounded-xl p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Class filter -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Select Class</label>
                <select x-model="selectedClass"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="all">All Classes</option>
                    <option value="10A">Grade 10A</option>
                    <option value="10B">Grade 10B</option>
                    <option value="11A">Grade 11A</option>
                    <option value="11B">Grade 11B</option>
                </select>
            </div>
            <!-- Search -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Search Student</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
                    </div>
                    <input type="search" x-model="searchQuery" placeholder="Name or ID..."
                        class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <!-- Bulk actions -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Quick Actions</label>
                <div class="flex gap-2">
                    <button @click="students.forEach(s=>s.status='present')"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-3 rounded-lg text-sm flex items-center justify-center gap-1 transition-colors">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> All Present
                    </button>
                    <button @click="students.forEach(s=>s.status=null)"
                        class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-medium py-2.5 px-3 rounded-lg text-sm flex items-center justify-center gap-1 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                    </button>
                </div>
            </div>
        </div>

        <!-- Summary strip -->
        <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-4 text-sm">
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span><span
                    class="text-gray-600">Present: <strong x-text="presentCount()"></strong></span></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-red-500"></span><span
                    class="text-gray-600">Absent: <strong x-text="absentCount()"></strong></span></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span><span
                    class="text-gray-600">Late: <strong x-text="lateCount()"></strong></span></div>
            <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span><span
                    class="text-gray-600">Unmarked: <strong x-text="unmarkedCount()"></strong></span></div>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
        <!-- Header -->
        <div
            class="hidden md:grid grid-cols-12 gap-4 px-4 py-3 bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wide">
            <div class="col-span-1">#</div>
            <div class="col-span-2">ID</div>
            <div class="col-span-3">Name</div>
            <div class="col-span-2">Class</div>
            <div class="col-span-4 text-center">Status</div>
        </div>

        <!-- Rows -->
        <div class="divide-y divide-gray-100">
            <template x-for="(student, index) in filtered" :key="student.id">
                <!-- Desktop row -->
                <div
                    class="hidden md:grid grid-cols-12 gap-4 px-4 py-3 items-center hover:bg-gray-50 transition-colors">
                    <div class="col-span-1 text-sm text-gray-400" x-text="index + 1"></div>
                    <div class="col-span-2 text-sm font-mono text-gray-700" x-text="student.id"></div>
                    <div class="col-span-3">
                        <p class="text-sm font-medium text-gray-800" x-text="student.name"></p>
                        <p class="text-xs text-gray-400" x-text="student.email"></p>
                    </div>
                    <div class="col-span-2">
                        <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700"
                            x-text="'Grade ' + student.class"></span>
                    </div>
                    <div class="col-span-4 flex gap-2">
                        <button @click="toggle(student.id,'present')"
                            :class="student.status==='present' ? 'bg-green-600 text-white ring-2 ring-green-500 ring-offset-1' : 'bg-white border border-gray-200 text-gray-600 hover:bg-green-50'"
                            class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all">
                            <i data-lucide="check" class="w-3.5 h-3.5 inline mr-0.5"></i>P
                        </button>
                        <button @click="toggle(student.id,'absent')"
                            :class="student.status==='absent' ? 'bg-red-600 text-white ring-2 ring-red-500 ring-offset-1' : 'bg-white border border-gray-200 text-gray-600 hover:bg-red-50'"
                            class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all">
                            <i data-lucide="x" class="w-3.5 h-3.5 inline mr-0.5"></i>A
                        </button>
                        <button @click="toggle(student.id,'late')"
                            :class="student.status==='late' ? 'bg-amber-600 text-white ring-2 ring-amber-500 ring-offset-1' : 'bg-white border border-gray-200 text-gray-600 hover:bg-amber-50'"
                            class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all">
                            <i data-lucide="clock" class="w-3.5 h-3.5 inline mr-0.5"></i>L
                        </button>
                    </div>
                </div>

                <!-- Mobile row -->
                <div class="md:hidden px-4 py-3 hover:bg-gray-50 transition-colors">
                    <div class="flex items-center justify-between mb-2">
                        <div>
                            <p class="text-sm font-medium text-gray-800" x-text="student.name"></p>
                            <p class="text-xs text-gray-400" x-text="student.id + ' • Grade ' + student.class"></p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button @click="toggle(student.id,'present')"
                            :class="student.status==='present' ? 'bg-green-600 text-white' : 'bg-white border border-gray-200 text-gray-600'"
                            class="flex-1 py-2 rounded-lg text-sm font-medium transition-all">Present</button>
                        <button @click="toggle(student.id,'absent')"
                            :class="student.status==='absent' ? 'bg-red-600 text-white' : 'bg-white border border-gray-200 text-gray-600'"
                            class="flex-1 py-2 rounded-lg text-sm font-medium transition-all">Absent</button>
                        <button @click="toggle(student.id,'late')"
                            :class="student.status==='late' ? 'bg-amber-600 text-white' : 'bg-white border border-gray-200 text-gray-600'"
                            class="flex-1 py-2 rounded-lg text-sm font-medium transition-all">Late</button>
                    </div>
                </div>
            </template>

            <!-- Empty state -->
            <div x-show="filtered.length === 0" class="py-12 text-center">
                <i data-lucide="search-x" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                <p class="text-gray-500 text-sm">No students found matching your criteria</p>
            </div>
        </div>
    </div>
</div>
