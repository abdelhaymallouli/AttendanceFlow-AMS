<!--
  MOLECULE: StatCard
  Dashboard KPI/metric cards.
  Variants: blue | green | red | amber | with-trend
-->

<!-- STAT CARD — TOTAL STUDENTS (blue) -->
<div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
            <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
        </div>
        <span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded-full">+2.5%</span>
    </div>
    <p class="text-2xl font-bold text-gray-800 mb-1">847</p>
    <p class="text-sm text-gray-500">Total Students</p>
</div>

<!-- STAT CARD — PRESENT TODAY (green) -->
<div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
            <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
        </div>
        <span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded-full">96.5%</span>
    </div>
    <p class="text-2xl font-bold text-gray-800 mb-1">817</p>
    <p class="text-sm text-gray-500">Present Today</p>
</div>

<!-- STAT CARD — ABSENT TODAY (red) -->
<div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition-shadow">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
            <i data-lucide="x-circle" class="w-6 h-6 text-red-600"></i>
        </div>
        <span class="text-xs font-medium text-red-600 bg-red-50 px-2 py-1 rounded-full">3.5%</span>
    </div>
    <p class="text-2xl font-bold text-gray-800 mb-1">30</p>
    <p class="text-sm text-gray-500">Absent Today</p>
</div>

<!-- STAT CARD — PENDING JUSTIFICATIONS (amber) + LINK -->
<a href="admin-justifications.html"
    class="block bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition-shadow cursor-pointer">
    <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center">
            <i data-lucide="file-text" class="w-6 h-6 text-amber-600"></i>
        </div>
        <span class="text-xs font-medium text-amber-600 bg-amber-50 px-2 py-1 rounded-full">Action</span>
    </div>
    <p class="text-2xl font-bold text-gray-800 mb-1">7</p>
    <p class="text-sm text-gray-500">Pending Justifications</p>
</a>
