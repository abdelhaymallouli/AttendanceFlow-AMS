<!--
  ATOM: BaseSelect
  Variants: default | with label | compact
-->

<!-- DEFAULT SELECT -->
<select class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
         bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
         transition-all duration-150 cursor-pointer">
    <option value="">Choose an option</option>
    <option value="10A">Grade 10A</option>
    <option value="10B">Grade 10B</option>
    <option value="11A">Grade 11A</option>
    <option value="11B">Grade 11B</option>
</select>

<!-- SELECT WITH LABEL -->
<div class="w-full">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Select Class</label>
    <select class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
           bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
           transition-all duration-150 cursor-pointer">
        <option value="all">All Classes</option>
        <option value="10A">Grade 10A</option>
        <option value="10B">Grade 10B</option>
        <option value="11A">Grade 11A</option>
        <option value="11B">Grade 11B</option>
        <option value="12A">Grade 12A</option>
    </select>
</div>
