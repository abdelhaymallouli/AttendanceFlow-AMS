<!--
  ATOM: BaseSelect
  Variants: default | with label | compact
-->

<!-- DEFAULT SELECT -->
<div class="relative">
    <select data-hs-select='{
        "placeholder": "Choose an option",
        "toggleTag": "<button type=\\"button\\"><span data-title></span><span class="ms-2"><svg class="flex-shrink-0 size-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg></span></button>",
        "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-3 px-4 pe-9 flex items-center text-start w-full cursor-pointer bg-layer border border-layer-line rounded-lg text-sm text-foreground focus:outline-none focus:border-primary-focus focus:ring-primary-focus focus:ring-1",
        "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-layer border border-layer-line rounded-lg overflow-hidden overflow-y-auto shadow-sm shadow-layer-line",
        "optionClasses": "py-2 px-4 w-full text-sm text-foreground cursor-pointer hover:bg-layer-hover rounded-lg focus:outline-none focus:bg-layer-hover",
        "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span>[TEXT]</span><span class=\"hidden hs-selected:block\"><svg class=\"flex-shrink-0 w-3.5 h-3.5 text-primary\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
    }' class="">
        <option value="">Choose an option</option>
        <option value="10A">Grade 10A</option>
        <option value="10B">Grade 10B</option>
        <option value="11A">Grade 11A</option>
        <option value="11B">Grade 11B</option>
    </select>
</div>

<!-- SELECT WITH LABEL -->
<div class="w-full">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Select Class</label>
    <div class="relative">
        <select data-hs-select='{
            "placeholder": "Select Class",
            "toggleTag": "<button type=\\"button\\"><span data-title></span><span class="ms-2"><svg class="flex-shrink-0 size-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg></span></button>",
            "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-3 px-4 pe-9 flex items-center text-start w-full cursor-pointer bg-layer border border-layer-line rounded-lg text-sm text-foreground focus:outline-none focus:border-primary-focus focus:ring-primary-focus focus:ring-1",
            "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-layer border border-layer-line rounded-lg overflow-hidden overflow-y-auto shadow-sm shadow-layer-line",
            "optionClasses": "py-2 px-4 w-full text-sm text-foreground cursor-pointer hover:bg-layer-hover rounded-lg focus:outline-none focus:bg-layer-hover",
            "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span>[TEXT]</span><span class=\"hidden hs-selected:block\"><svg class=\"flex-shrink-0 w-3.5 h-3.5 text-primary\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
        }' class="">
            <option value="all">All Classes</option>
            <option value="10A">Grade 10A</option>
            <option value="10B">Grade 10B</option>
            <option value="11A">Grade 11A</option>
            <option value="11B">Grade 11B</option>
            <option value="12A">Grade 12A</option>
        </select>
    </div>
</div>
