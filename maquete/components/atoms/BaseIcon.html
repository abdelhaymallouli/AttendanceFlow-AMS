<!--
  ATOM: BaseIcon
  Library: Lucide Icons (https://lucide.dev)
  Sizes: w-3/h-3 (xs) | w-4/h-4 (sm) | w-5/h-5 (md) | w-6/h-6 (lg) | w-8/h-8 (xl)
  Colors: Use Tailwind text-* utility classes
  Usage: Replace data-lucide value with any icon name from lucide.dev
-->

<!-- ICON SIZES -->
<i data-lucide="star" class="w-3 h-3 text-gray-600"></i> <!-- xs -->
<i data-lucide="star" class="w-4 h-4 text-gray-600"></i> <!-- sm -->
<i data-lucide="star" class="w-5 h-5 text-gray-600"></i> <!-- md -->
<i data-lucide="star" class="w-6 h-6 text-gray-600"></i> <!-- lg -->
<i data-lucide="star" class="w-8 h-8 text-gray-600"></i> <!-- xl -->

<!-- ICON WITH COLORED CONTAINER -->
<div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center">
    <i data-lucide="users" class="w-5 h-5 text-blue-600"></i>
</div>
