<!--
  ATOM: BaseBadge
  Variants: info | success | warning | danger | neutral | dot-notification
  Usage: Copy the variant you need inside any container.
-->

<!-- INFO BADGE -->
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
    Information
</span>

<!-- SUCCESS BADGE -->
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
    Present
</span>

<!-- WARNING BADGE -->
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">
    Late
</span>

<!-- DANGER BADGE -->
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
    Absent
</span>

<!-- NEUTRAL BADGE -->
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">
    Draft
</span>

<!-- COUNT BADGE (e.g. sidebar notification) -->
<span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-500 text-white text-xs font-bold">
    7
</span>

<!-- "HOT" label badge -->
<span class="px-2 py-0.5 rounded-full bg-red-500 text-white text-xs font-bold">
    HOT
</span>

<!-- DOT NOTIFICATION (small indicator) -->
<span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>

<!-- STATUS BADGE WITH ICON -->
<span
    class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
    Active
</span>

<!-- PENDING BADGE -->
<span
    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-50 text-yellow-700 border border-yellow-200">
    Pending Review
</span>

<!-- APPROVED BADGE -->
<span
    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200">
    Approved
</span>
