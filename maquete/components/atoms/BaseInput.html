<!--
  ATOM: BaseInput
  Variants: text | search | password | textarea
  Usage: Copy the variant you need inside a form or filter container.
-->

<!-- TEXT INPUT -->
<div class="w-full">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Label</label>
    <input type="text" placeholder="Enter value..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
           bg-white placeholder-gray-400
           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
           transition-all duration-150">
</div>

<!-- SEARCH INPUT WITH ICON -->
<div class="relative w-full">
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
    </div>
    <input type="search" placeholder="Search student or ID..." class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
           bg-white placeholder-gray-400
           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
           transition-all duration-150">
</div>

<!-- PASSWORD INPUT -->
<div class="w-full" x-data="{ show: false }">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
    <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-lucide="lock" class="w-4 h-4 text-gray-400"></i>
        </div>
        <input :type="show ? 'text' : 'password'" placeholder="Enter password..." class="w-full pl-9 pr-10 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
             bg-white placeholder-gray-400
             focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
             transition-all duration-150">
        <button type="button" @click="show = !show"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
            <i :data-lucide="show ? 'eye-off' : 'eye'" class="w-4 h-4"></i>
        </button>
    </div>
</div>

<!-- TEXTAREA -->
<div class="w-full">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Notes</label>
    <textarea rows="4" placeholder="Write your notes here..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800
           bg-white placeholder-gray-400 resize-none
           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
           transition-all duration-150"></textarea>
</div>

<!-- INPUT WITH ERROR STATE -->
<div class="w-full">
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
    <input type="email" placeholder="Enter email..." class="w-full px-4 py-2.5 border border-red-400 rounded-lg text-sm text-gray-800
           bg-white placeholder-gray-400
           focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-red-400
           transition-all duration-150">
    <p class="mt-1 text-xs text-red-600">This field is required.</p>
</div>
