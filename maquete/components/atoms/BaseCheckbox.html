<!--
  ATOM: BaseCheckbox
  Variants: basic | with label | indeterminate (for select-all)
-->

<!-- BASIC CHECKBOX -->
<input type="checkbox"
    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 transition-colors cursor-pointer">

<!-- CHECKBOX WITH LABEL -->
<label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 transition-colors">
    <span class="text-sm text-gray-700">Remember me</span>
</label>

<!-- SELECT-ALL (for tables) -->
<label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" id="selectAll"
        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 transition-colors">
    <span class="text-sm font-medium text-gray-700">Select All</span>
</label>
