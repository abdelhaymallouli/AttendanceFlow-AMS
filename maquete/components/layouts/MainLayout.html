<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- PAGE TITLE --> - Solicode AMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
    </style>
</head>

<!--
  LAYOUT: MainLayout
  Full-page shell: Sidebar + TopBar + scrollable content area.
  Usage:
    1. Replace <!-- PAGE TITLE --> with the page name.
2. Replace <!-- SIDEBAR ROLE --> with Admin / Teacher Portal etc.
3. Mark the active nav link by changing its class from default → active.
4. Drop your page content inside the <main> tag.
    5. Set the correct x-data on

    <body> if you need custom Alpine state.
        -->

        <body class="bg-white" x-data="{ sidebarOpen: false }">

            <!-- ===== MOBILE HEADER ===== -->
            <header
                class="lg:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="school" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-bold text-gray-800">Solicode AMS</span>
                </div>
                <button @click="sidebarOpen = true" class="text-gray-500 p-1">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </header>

            <!-- ===== MOBILE SIDEBAR OVERLAY ===== -->
            <div x-show="sidebarOpen" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 -translate-x-full"
                x-transition:enter-end="opacity-100 translate-x-0" x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 translate-x-0"
                x-transition:leave-end="opacity-0 -translate-x-full" class="fixed inset-0 z-50 lg:hidden"
                style="display:none;">
                <div class="absolute inset-0 bg-black/50" @click="sidebarOpen = false"></div>
                <div class="absolute left-0 top-0 h-full w-64 bg-white border-r border-gray-200 flex flex-col">
                    <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                                <i data-lucide="school" class="w-5 h-5 text-white"></i>
                            </div>
                            <div>
                                <h1 class="text-base font-bold text-gray-800">Solicode AMS</h1>
                                <p class="text-xs text-gray-500"><!-- SIDEBAR ROLE --></p>
                            </div>
                        </div>
                        <button @click="sidebarOpen = false" class="text-gray-400 hover:text-gray-600">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                        <!-- NAV LINKS — copy from NavLink.html -->
                    </nav>
                    <div class="border-t border-gray-200 p-4">
                        <!-- USER SNIPPET — copy from UserSnippet.html -->
                    </div>
                </div>
            </div>

            <!-- ===== PAGE SHELL ===== -->
            <div class="flex h-screen overflow-hidden">

                <!-- DESKTOP SIDEBAR -->
                <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-gray-200">
                    <div class="flex items-center h-16 px-6 border-b border-gray-200">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                                <i data-lucide="school" class="w-5 h-5 text-white"></i>
                            </div>
                            <div>
                                <h1 class="text-lg font-bold text-gray-800">Solicode AMS</h1>
                                <p class="text-xs text-gray-500"><!-- SIDEBAR ROLE --></p>
                            </div>
                        </div>
                    </div>
                    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                        <!-- NAV LINKS — copy from NavLink.html -->
                    </nav>
                    <div class="border-t border-gray-200 p-4">
                        <!-- USER SNIPPET — copy from UserSnippet.html -->
                    </div>
                </aside>

                <!-- MAIN AREA -->
                <div class="flex-1 flex flex-col overflow-hidden">

                    <!-- TOP BAR -->
                    <header
                        class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6">
                        <div class="flex items-center space-x-4">
                            <button @click="sidebarOpen = true" class="lg:hidden text-gray-500">
                                <i data-lucide="menu" class="w-6 h-6"></i>
                            </button>
                            <div>
                                <h2 class="text-xl font-bold text-gray-800"><!-- PAGE TITLE --></h2>
                                <p class="text-sm text-gray-500 hidden sm:block"><!-- PAGE SUBTITLE --></p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="hidden md:flex items-center space-x-2 text-sm text-gray-500">
                                <i data-lucide="calendar" class="w-4 h-4"></i>
                                <span id="layoutDate"></span>
                            </div>
                            <button
                                class="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                                <i data-lucide="bell" class="w-5 h-5"></i>
                                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                        </div>
                    </header>

                    <!-- PAGE CONTENT -->
                    <main class="flex-1 overflow-y-auto p-4 lg:p-6">
                        <!-- ===== DROP YOUR PAGE CONTENT HERE ===== -->
                    </main>

                </div>
            </div>

            <script>
                lucide.createIcons();
                const d = document.getElementById('layoutDate');
                if (d) d.textContent = new Date().toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
            </script>
        </body>

</html>
