<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AttendanceFlow AMS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .role-btn-active {
            border-color: #4f46e5 !important;
            background-color: #eef2ff !important;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-lg">
        <!-- Brand Logo -->
        <div class="flex flex-col items-center mb-10">
            <div
                class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-200 mb-4 transform hover:rotate-6 transition-transform duration-300">
                <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">AttendanceFlow</h1>
            <p class="text-slate-500 font-medium mt-1">Professional Management System</p>
        </div>

        <!-- Main Login Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-10 border border-white">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-slate-500 text-sm">Please enter your credentials to access your portal</p>
            </div>

            <!-- Role Switcher -->
            <div class="mb-8 p-1 bg-slate-100 rounded-xl flex">
                <button onclick="selectRole('admin')" id="adminBtn"
                    class="flex-1 py-3 px-4 rounded-lg flex items-center justify-center gap-2 font-semibold text-sm transition-all duration-200 role-btn-active">
                    <i data-lucide="user-cog" class="w-4 h-4"></i>
                    Administrator
                </button>
                <button onclick="selectRole('student')" id="studentBtn"
                    class="flex-1 py-3 px-4 rounded-lg flex items-center justify-center gap-2 font-semibold text-sm text-slate-600 hover:text-slate-900 transition-all duration-200">
                    <i data-lucide="graduation-cap" class="w-4 h-4"></i>
                    Student
                </button>
            </div>

            <!-- LoginForm -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-2"
                        id="usernameLabel">Admin Email</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none group-focus-within:text-indigo-600 transition-colors">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="username"
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-600 outline-none transition-all placeholder:text-slate-400"
                            placeholder="name@school.edu" required>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                        <a href="#"
                            class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Forgot
                            Password?</a>
                    </div>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none group-focus-within:text-indigo-600 transition-colors">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password"
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-600 outline-none transition-all placeholder:text-slate-400"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember" type="checkbox"
                        class="w-5 h-5 text-indigo-600 border-slate-300 rounded-lg focus:ring-indigo-500 focus:ring-offset-0">
                    <label for="remember" class="ml-3 text-sm font-medium text-slate-600">Keep me signed in</label>
                </div>

                <button type="submit"
                    class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all duration-300 transform active:scale-[0.98] shadow-xl flex items-center justify-center gap-2 group">
                    <span>Secure Access</span>
                    <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <!-- Quick Access Badges -->
            <div class="mt-8 pt-8 border-t border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Quick Access Profiles</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-3 bg-white border border-slate-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600">
                            <i data-lucide="shield" class="w-4 h-4"></i>
                        </div>
                        <div class="text-[10px]">
                            <p class="font-bold text-slate-800">Admin</p>
                            <p class="text-slate-500">Full Access</p>
                        </div>
                    </div>
                    <div class="p-3 bg-white border border-slate-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center text-green-600">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <div class="text-[10px]">
                            <p class="font-bold text-slate-800">Student</p>
                            <p class="text-slate-500">Record View</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center mt-10 text-slate-400 text-sm font-medium">
            &copy; 2024 AttendanceFlow AMS. Secure Infrastructure.
        </p>
    </div>

    <!-- Scripting for interactivity -->
    <script>
        lucide.createIcons();

        let currentRole = 'admin';

        function selectRole(role) {
            currentRole = role;
            const adminBtn = document.getElementById('adminBtn');
            const studentBtn = document.getElementById('studentBtn');
            const usernameLabel = document.getElementById('usernameLabel');

            // Remove active styles
            adminBtn.classList.remove('role-btn-active', 'text-slate-900');
            adminBtn.classList.add('text-slate-600');
            studentBtn.classList.remove('role-btn-active', 'text-slate-900');
            studentBtn.classList.add('text-slate-600');

            // Apply active styles
            if (role === 'admin') {
                adminBtn.classList.add('role-btn-active', 'text-slate-900');
                usernameLabel.textContent = 'Admin Email';
            } else {
                studentBtn.classList.add('role-btn-active', 'text-slate-900');
                usernameLabel.textContent = 'Student ID or Email';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simulated login logic
            if (currentRole === 'admin' && (user === 'admin@school.edu' || user === 'admin') && pass === 'admin123') {
                window.location.href = 'admin-dashboard.html';
            } else if (currentRole === 'student' && (user === 'student@school.edu' || user === 'student') && pass === 'student123') {
                window.location.href = 'student-dashboard.html';
            } else {
                alert('Invalid identification. Use the provided demo credentials.');
            }
        }
    </script>
    <!-- Flowbite JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>

</html>
