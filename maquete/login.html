<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Solicode AMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://preline.co/assets/css/main.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">

            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
                    <i data-lucide="school" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Solicode AMS</h1>
                <p class="text-gray-600">Attendance Management System</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Welcome Back</h2>

                <!-- Role Selection -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-3">Select Your Role</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="selectRole('admin')" id="adminBtn"
                            class="role-btn flex flex-col items-center justify-center p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all duration-200">
                            <i data-lucide="shield-check" class="w-6 h-6 text-blue-600 mb-2"></i>
                            <span class="text-sm font-medium text-gray-700">Admin</span>
                        </button>
                        <button onclick="selectRole('teacher')" id="teacherBtn"
                            class="role-btn flex flex-col items-center justify-center p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all duration-200">
                            <i data-lucide="user-check" class="w-6 h-6 text-blue-600 mb-2"></i>
                            <span class="text-sm font-medium text-gray-700">Teacher</span>
                        </button>
                        <button onclick="selectRole('student')" id="studentBtn"
                            class="role-btn flex flex-col items-center justify-center p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all duration-200">
                            <i data-lucide="graduation-cap" class="w-6 h-6 text-blue-600 mb-2"></i>
                            <span class="text-sm font-medium text-gray-700">Student</span>
                        </button>
                    </div>
                </div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            <span id="usernameLabel">Email or ID</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                            </div>
                            <input type="text" id="username"
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white text-gray-800"
                                placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
                            </div>
                            <input type="password" id="password"
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white text-gray-800"
                                placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox"
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Forgot password?</a>
                    </div>

                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center shadow-sm hover:shadow-md">
                        <span>Sign In</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i>
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <p class="text-xs font-semibold text-gray-700 mb-2">Demo Credentials:</p>
                    <div class="text-xs text-gray-600 space-y-1">
                        <p><strong>Admin:</strong> admin@school.edu / admin123</p>
                        <p><strong>Teacher:</strong> teacher@school.edu / teacher123</p>
                        <p><strong>Student:</strong> student@school.edu / student123</p>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-6 text-sm text-gray-600">
                <p>&copy; 2025 Solicode AMS. All rights reserved.</p>
            </div>
        </div>
    </div>


    <script>
        lucide.createIcons();

        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            const adminBtn = document.getElementById('adminBtn');
            const teacherBtn = document.getElementById('teacherBtn');
            const studentBtn = document.getElementById('studentBtn');
            const usernameLabel = document.getElementById('usernameLabel');

            // Reset all buttons
            adminBtn.classList.remove('border-blue-600', 'bg-blue-50');
            teacherBtn.classList.remove('border-blue-600', 'bg-blue-50');
            studentBtn.classList.remove('border-blue-600', 'bg-blue-50');

            // Highlight selected
            if (role === 'admin') {
                adminBtn.classList.add('border-blue-600', 'bg-blue-50');
                usernameLabel.textContent = 'Admin Email';
            } else if (role === 'teacher') {
                teacherBtn.classList.add('border-blue-600', 'bg-blue-50');
                usernameLabel.textContent = 'Teacher Email';
            } else {
                studentBtn.classList.add('border-blue-600', 'bg-blue-50');
                usernameLabel.textContent = 'Student Email or ID';
            }
        }

        function handleLogin(event) {
            event.preventDefault();

            if (!selectedRole) {
                alert('Please select your role (Administrator, Teacher, or Student)');
                return;
            }

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const result = DataHelpers.authenticate(username, password);

            if (result && result.role.name === selectedRole) {
                localStorage.setItem('ams_user', JSON.stringify(result.user));
                localStorage.setItem('ams_role', JSON.stringify(result.role));

                if (result.role.name === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else if (result.role.name === 'teacher') {
                    window.location.href = 'teacher-dashboard.html';
                } else if (result.role.name === 'student') {
                    window.location.href = 'student-dashboard.html';
                }
            } else {
                alert('Invalid credentials. Please try the demo credentials provided below.');
            }
        }

        selectRole('admin');
    </script>
</body>

</html>
