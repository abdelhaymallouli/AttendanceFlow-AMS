<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Entry - Solicode AMS Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .content-area { padding-bottom: 100px; }
        .student-row.present { background-color: #f0fdf4; border-color: #86efac; }
        .student-row.absent { background-color: #fff1f2; border-color: #fca5a5; }
        .student-row.late { background-color: #fffbeb; border-color: #fcd34d; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="attendanceApp()">

    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="flex items-center gap-3 px-4 py-3">
            <a href="teacher-dashboard.html" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100">
                <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
            </a>
            <div class="flex-1">
                <h1 class="text-sm font-bold text-gray-800">Attendance Entry</h1>
                <p class="text-xs text-gray-500">Mathematics · Grade 10A</p>
            </div>
            <button onclick="saveAttendance()" class="bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl">Save</button>
        </div>
    </div>

    <!-- Session Banner -->
    <div class="bg-white border-b border-gray-100 px-4 py-3">
        <div class="flex gap-3 overflow-x-auto pb-1 -mx-1 px-1" style="scrollbar-width:none">
            <div class="bg-blue-600 text-white rounded-xl px-4 py-2 flex-shrink-0 text-center">
                <p class="text-xs text-blue-200">Date</p>
                <p class="text-sm font-bold">March 8</p>
            </div>
            <div class="bg-gray-100 rounded-xl px-4 py-2 flex-shrink-0 text-center">
                <p class="text-xs text-gray-500">Session</p>
                <p class="text-sm font-bold text-gray-800">09:00–11:00</p>
            </div>
            <div class="bg-gray-100 rounded-xl px-4 py-2 flex-shrink-0 text-center">
                <p class="text-xs text-gray-500">Room</p>
                <p class="text-sm font-bold text-gray-800">201</p>
            </div>
            <div class="bg-gray-100 rounded-xl px-4 py-2 flex-shrink-0 text-center">
                <p class="text-xs text-gray-500">Students</p>
                <p class="text-sm font-bold text-gray-800">32</p>
            </div>
        </div>
    </div>

    <!-- Summary Bar -->
    <div class="bg-white border-b border-gray-100 px-4 py-3">
        <div class="flex gap-4">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="text-xs text-gray-600"><span x-text="presentCount" class="font-bold text-green-600"></span> Present</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <span class="text-xs text-gray-600"><span x-text="absentCount" class="font-bold text-red-500"></span> Absent</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                <span class="text-xs text-gray-600"><span x-text="lateCount" class="font-bold text-amber-600"></span> Late</span>
            </div>
        </div>
    </div>

    <!-- Mark All -->
    <div class="px-4 py-3 bg-white border-b border-gray-100">
        <div class="flex gap-2">
            <button @click="markAll('present')" class="flex-1 bg-green-50 border border-green-200 text-green-700 text-xs font-semibold py-2 rounded-xl flex items-center justify-center gap-1">
                <i data-lucide="check" class="w-3.5 h-3.5"></i> All Present
            </button>
            <button @click="markAll('absent')" class="flex-1 bg-red-50 border border-red-200 text-red-600 text-xs font-semibold py-2 rounded-xl flex items-center justify-center gap-1">
                <i data-lucide="x" class="w-3.5 h-3.5"></i> All Absent
            </button>
        </div>
    </div>

    <!-- Student List -->
    <div class="content-area px-4 py-3 space-y-2">
        <template x-for="(student, index) in students" :key="student.id">
            <div class="student-row rounded-2xl p-4 border-2 border-gray-100 bg-white transition-all"
                 :class="{ 'present': student.status === 'present', 'absent': student.status === 'absent', 'late': student.status === 'late' }">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 font-bold text-sm"
                         :class="student.status === 'present' ? 'bg-green-100 text-green-700' : student.status === 'absent' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-700'"
                         x-text="student.initials"></div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-gray-800 truncate" x-text="student.name"></p>
                        <p class="text-xs text-gray-500" x-text="student.id"></p>
                    </div>
                    <div class="flex gap-1.5 flex-shrink-0">
                        <button @click="setStatus(student, 'present')"
                            class="w-9 h-9 rounded-xl flex items-center justify-center transition-all"
                            :class="student.status === 'present' ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-400'">
                            <i data-lucide="check" class="w-4 h-4"></i>
                        </button>
                        <button @click="setStatus(student, 'late')"
                            class="w-9 h-9 rounded-xl flex items-center justify-center transition-all"
                            :class="student.status === 'late' ? 'bg-amber-500 text-white' : 'bg-gray-100 text-gray-400'">
                            <i data-lucide="clock" class="w-4 h-4"></i>
                        </button>
                        <button @click="setStatus(student, 'absent')"
                            class="w-9 h-9 rounded-xl flex items-center justify-center transition-all"
                            :class="student.status === 'absent' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-400'">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Save Button -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-4" style="padding-bottom: calc(env(safe-area-inset-bottom, 8px) + 16px)">
        <button onclick="saveAttendance()" class="w-full bg-blue-600 text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
            <i data-lucide="save" class="w-5 h-5"></i>
            Submit Attendance
        </button>
    </div>

    <script>
        function attendanceApp() {
            return {
                students: [
                    { id: 'STU-001', name: 'Ahmed Alami', initials: 'AA', status: 'present' },
                    { id: 'STU-002', name: 'Fatima Benali', initials: 'FB', status: 'present' },
                    { id: 'STU-003', name: 'Karim Hassan', initials: 'KH', status: 'absent' },
                    { id: 'STU-004', name: 'Sara Amrani', initials: 'SA', status: 'present' },
                    { id: 'STU-005', name: 'Mohammed Ouali', initials: 'MO', status: 'late' },
                    { id: 'STU-006', name: 'Leila Tazi', initials: 'LT', status: 'present' },
                    { id: 'STU-007', name: 'Omar Idrissi', initials: 'OI', status: 'present' },
                    { id: 'STU-008', name: 'Nadia Chraibi', initials: 'NC', status: 'absent' },
                ],
                get presentCount() { return this.students.filter(s => s.status === 'present').length; },
                get absentCount() { return this.students.filter(s => s.status === 'absent').length; },
                get lateCount() { return this.students.filter(s => s.status === 'late').length; },
                setStatus(student, status) { student.status = status; },
                markAll(status) { this.students.forEach(s => s.status = status); }
            };
        }
        function saveAttendance() { alert('Attendance saved successfully!'); }
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
