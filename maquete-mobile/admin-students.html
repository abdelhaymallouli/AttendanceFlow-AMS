<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Students - Solicode AMS Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .content-area { padding-bottom: 90px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="studentsApp()">

    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="flex items-center gap-3 px-4 py-3">
            <a href="admin-dashboard.html" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100">
                <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
            </a>
            <div class="flex-1">
                <h1 class="text-sm font-bold text-gray-800">Students</h1>
                <p class="text-xs text-gray-500" x-text="filteredStudents.length + ' students'"></p>
            </div>
            <button class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-sm">
                <i data-lucide="user-plus" class="w-4 h-4 text-white"></i>
            </button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="px-4 py-3 bg-white border-b border-gray-100">
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
            </div>
            <input type="text" x-model="search" placeholder="Search by name or ID..."
                class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border-0 rounded-xl text-sm text-gray-800 placeholder-gray-400">
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 px-4 py-3 overflow-x-auto bg-white border-b border-gray-100" style="scrollbar-width:none">
        <button @click="filter='all'" :class="filter==='all' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">All</button>
        <button @click="filter='good'" :class="filter==='good' ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">Good</button>
        <button @click="filter='atrisk'" :class="filter==='atrisk' ? 'bg-amber-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">At Risk</button>
        <button @click="filter='critical'" :class="filter==='critical' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">Critical</button>
    </div>

    <!-- Student Cards -->
    <div class="content-area px-4 py-3 space-y-2">
        <template x-for="student in filteredStudents" :key="student.id">
            <div class="bg-white rounded-2xl border border-gray-100 p-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 font-bold"
                         :class="student.status === 'good' ? 'bg-green-100 text-green-700' : student.status === 'atrisk' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-600'"
                         x-text="student.initials"></div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-gray-800 truncate" x-text="student.name"></p>
                        <p class="text-xs text-gray-500" x-text="student.grade + ' · ' + student.id"></p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="text-base font-bold"
                           :class="student.status === 'good' ? 'text-green-600' : student.status === 'atrisk' ? 'text-amber-600' : 'text-red-500'"
                           x-text="student.attendance + '%'"></p>
                        <p class="text-xs text-gray-400">Attendance</p>
                    </div>
                    <button class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0 ml-1">
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
                    </button>
                </div>
                <!-- Progress Bar -->
                <div class="mt-3 bg-gray-100 rounded-full h-1.5">
                    <div class="h-1.5 rounded-full transition-all"
                         :class="student.status === 'good' ? 'bg-green-500' : student.status === 'atrisk' ? 'bg-amber-500' : 'bg-red-500'"
                         :style="'width:' + student.attendance + '%'"></div>
                </div>
            </div>
        </template>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 z-40" style="padding-bottom: env(safe-area-inset-bottom, 8px)">
        <div class="flex items-center justify-around py-2">
            <a href="admin-dashboard.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="home" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Home</span>
            </a>
            <a href="admin-students.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="users" class="w-5 h-5 text-blue-600"></i>
                <span class="text-xs font-medium text-blue-600">Students</span>
            </a>
            <a href="attendance-entry.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center -mt-5 shadow-lg shadow-blue-200">
                    <i data-lucide="clipboard-check" class="w-5 h-5 text-white"></i>
                </div>
            </a>
            <a href="admin-justifications.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="file-text" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Requests</span>
            </a>
            <a href="admin-reports.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="bar-chart-2" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Reports</span>
            </a>
        </div>
    </div>

    <script>
        function studentsApp() {
            return {
                search: '',
                filter: 'all',
                students: [
                    { id: 'STU-001', name: 'Ahmed Alami', grade: 'Grade 10A', initials: 'AA', attendance: 94, status: 'good' },
                    { id: 'STU-002', name: 'Fatima Benali', grade: 'Grade 10A', initials: 'FB', attendance: 98, status: 'good' },
                    { id: 'STU-003', name: 'Karim Hassan', grade: 'Grade 10A', initials: 'KH', attendance: 72, status: 'critical' },
                    { id: 'STU-004', name: 'Sara Amrani', grade: 'Grade 11B', initials: 'SA', attendance: 81, status: 'atrisk' },
                    { id: 'STU-005', name: 'Mohammed Ouali', grade: 'Grade 12A', initials: 'MO', attendance: 91, status: 'good' },
                    { id: 'STU-006', name: 'Leila Tazi', grade: 'Grade 11A', initials: 'LT', attendance: 87, status: 'atrisk' },
                    { id: 'STU-007', name: 'Omar Idrissi', grade: 'Grade 12B', initials: 'OI', attendance: 95, status: 'good' },
                    { id: 'STU-008', name: 'Nadia Chraibi', grade: 'Grade 10B', initials: 'NC', attendance: 69, status: 'critical' },
                ],
                get filteredStudents() {
                    return this.students.filter(s => {
                        const matchFilter = this.filter === 'all' || s.status === this.filter;
                        const matchSearch = this.search === '' || s.name.toLowerCase().includes(this.search.toLowerCase()) || s.id.toLowerCase().includes(this.search.toLowerCase());
                        return matchFilter && matchSearch;
                    });
                }
            };
        }
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
