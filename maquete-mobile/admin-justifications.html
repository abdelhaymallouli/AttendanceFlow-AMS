<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Justifications - Solicode AMS Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .content-area { padding-bottom: 90px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="justificationsApp()">

    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="flex items-center gap-3 px-4 py-3">
            <a href="admin-dashboard.html" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100">
                <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
            </a>
            <div class="flex-1">
                <h1 class="text-sm font-bold text-gray-800">Justifications</h1>
                <p class="text-xs text-gray-500" x-text="filtered.length + ' requests'"></p>
            </div>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 px-4 py-3 overflow-x-auto bg-white border-b border-gray-100" style="scrollbar-width:none">
        <button @click="filter='all'" :class="filter==='all' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">All</button>
        <button @click="filter='pending'" :class="filter==='pending' ? 'bg-amber-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">Pending</button>
        <button @click="filter='approved'" :class="filter==='approved' ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">Approved</button>
        <button @click="filter='rejected'" :class="filter==='rejected' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'"
            class="px-4 py-1.5 rounded-xl text-xs font-medium flex-shrink-0">Rejected</button>
    </div>

    <!-- Justification Cards -->
    <div class="content-area px-4 py-3 space-y-3">
        <template x-for="j in filtered" :key="j.id">
            <div class="bg-white rounded-2xl border border-gray-100 p-4">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 font-bold text-sm"
                         :class="j.status === 'pending' ? 'bg-amber-100 text-amber-700' : j.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-600'"
                         x-text="j.initials"></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <p class="text-sm font-semibold text-gray-800" x-text="j.name"></p>
                            <span class="text-xs font-medium px-2 py-0.5 rounded-lg"
                                  :class="j.status === 'pending' ? 'bg-amber-100 text-amber-700' : j.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-600'"
                                  x-text="j.status.charAt(0).toUpperCase() + j.status.slice(1)"></span>
                        </div>
                        <p class="text-xs text-gray-500 mb-0.5" x-text="j.type + ' · ' + j.grade"></p>
                        <p class="text-xs text-gray-400" x-text="j.date"></p>
                        <p class="text-xs text-gray-600 mt-2 line-clamp-2" x-text="j.reason"></p>
                    </div>
                </div>
                <!-- Actions for pending -->
                <template x-if="j.status === 'pending'">
                    <div class="flex gap-2 mt-3 pt-3 border-t border-gray-50">
                        <button @click="j.status = 'approved'" class="flex-1 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-semibold py-2.5 rounded-xl flex items-center justify-center gap-1">
                            <i data-lucide="check" class="w-3.5 h-3.5"></i> Approve
                        </button>
                        <button @click="j.status = 'rejected'" class="flex-1 bg-red-50 border border-red-200 text-red-600 text-xs font-semibold py-2.5 rounded-xl flex items-center justify-center gap-1">
                            <i data-lucide="x" class="w-3.5 h-3.5"></i> Reject
                        </button>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 z-40" style="padding-bottom: env(safe-area-inset-bottom, 8px)">
        <div class="flex items-center justify-around py-2">
            <a href="admin-dashboard.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="home" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Home</span>
            </a>
            <a href="admin-students.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="users" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Students</span>
            </a>
            <a href="attendance-entry.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center -mt-5 shadow-lg shadow-blue-200">
                    <i data-lucide="clipboard-check" class="w-5 h-5 text-white"></i>
                </div>
            </a>
            <a href="admin-justifications.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i>
                <span class="text-xs font-medium text-blue-600">Requests</span>
            </a>
            <a href="admin-reports.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <i data-lucide="bar-chart-2" class="w-5 h-5 text-gray-400"></i>
                <span class="text-xs font-medium text-gray-400">Reports</span>
            </a>
        </div>
    </div>

    <script>
        function justificationsApp() {
            return {
                filter: 'all',
                justifications: [
                    { id: 1, name: 'Ahmed Alami', initials: 'AA', grade: 'Grade 10A', type: 'Medical', date: 'March 5, 2025', reason: 'Doctor appointment confirmed by medical certificate.', status: 'pending' },
                    { id: 2, name: 'Fatima Benali', initials: 'FB', grade: 'Grade 11B', type: 'Family', date: 'March 3, 2025', reason: 'Family emergency requiring urgent travel.', status: 'pending' },
                    { id: 3, name: 'Karim Hassan', initials: 'KH', grade: 'Grade 10A', type: 'Medical', date: 'Feb 28, 2025', reason: 'Hospital stay due to surgery.', status: 'approved' },
                    { id: 4, name: 'Sara Amrani', initials: 'SA', grade: 'Grade 11B', type: 'Other', date: 'Feb 25, 2025', reason: 'No valid reason provided.', status: 'rejected' },
                    { id: 5, name: 'Mohammed Ouali', initials: 'MO', grade: 'Grade 12A', type: 'Official', date: 'Feb 20, 2025', reason: 'Official government appointment.', status: 'approved' },
                ],
                get filtered() {
                    if (this.filter === 'all') return this.justifications;
                    return this.justifications.filter(j => j.status === this.filter);
                }
            };
        }
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
